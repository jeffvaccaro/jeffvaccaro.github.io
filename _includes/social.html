<ul class="social-media-list">
{%- for entry in site.minima.social_links -%}
  {%- if entry.platform == 'bluesky' -%}

      <svg class="svg-icon grey" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22 fill=%22%23828282%22 fill-rule=%22evenodd%22 clip-rule=%22evenodd%22 stroke-linejoin=%22round%22 stroke-miterlimit=%221.414%22%3E%3Cpath d=%22M8,0c4.418,0,8,3.582,8,8s-3.582,8-8,8s-8-3.582-8-8S3.582,0,8,0 M3.468,1.904c1.834,1.377,3.807,4.169,4.532,5.668c0.724-1.498,2.697-4.291,4.532-5.668c1.322-0.994,3.466-1.762,3.466,0.684c0,0.489-0.28,4.105-0.444,4.692c-0.571,2.041-2.652,2.561-4.503,2.246c3.236,0.551,4.059,2.375,2.281,4.199c-3.376,3.465-4.853-0.869-5.231-1.98c-0.069-0.204-0.102-0.299-0.102-0.218c0-0.081-0.033,0.014-0.102,0.218c-0.378,1.11-1.855,5.444-5.231,1.98c-1.778-1.824-0.955-3.649,2.281-4.199c-1.851,0.315-3.932-0.205-4.503-2.246C0.28,6.693,0,3.077,0,2.588C0,0.142,2.145,0.911,3.468,1.904%22/%3E%3C/svg%3E'); background-repeat: no-repeat; width: 16px; height: 16px;"></svg>
    </a>
  </li>
  {%- else -%}
  <li>
    <a {% unless entry.platform == 'rss' %}rel="me" {% endunless %}href="{{ entry.user_url }}" target="_blank" title="{{ entry.title | default: entry.platform }}">
      <svg class="svg-icon grey">
        <use xlink:href="{{ '/assets/minima-social-icons.svg#' | append: entry.platform | relative_url }}"></use>
      </svg>
    </a>
  </li>
  {%- endif -%}
{%- endfor -%}
</ul>
